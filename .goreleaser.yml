# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: poly

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: poly
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Merge"
      - "^chore\\(deps\\):"
  groups:
    - title: '🚀 Features'
      regexp: "^feat[(\\w)]*!?: "
      order: 0
    - title: '🛡️ Security'
      regexp: "^security[(\\w)]*!?: "
      order: 1
    - title: '🐛 Bug Fixes'
      regexp: "^fix[(\\w)]*!?: "
      order: 2
    - title: '⚙️ Refactoring'
      regexp: "^refactor[(\\w)]*!?: "
      order: 3
    - title: '🧹 Housekeeping'
      regexp: "^chore[(\\w)]*!?: "
      order: 4
    - title: Others
      order: 999

release:
  github:
    owner: ruipedro-pinheiro
    name: Poly
