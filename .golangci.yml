linters:
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - errcheck

issues:
  max-issues-per-linter: 100
  max-same-issues: 50
  exclude-rules:
    # Test files: errcheck noise is acceptable in tests
    - path: _test\.go
      linters:
        - errcheck
