name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Please be specific about what you want and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: "What problem does this solve? What's the current pain point?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How should this work? Be as specific as possible."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI / Interface
        - Provider integration
        - Tool system
        - MCP
        - Sandbox / Security
        - Configuration
        - Session management
        - CLI / Shell mode
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Other approaches you've thought of, if any"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: "Screenshots, links, related issues, etc."
